<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stadium Concert Arena – WebXR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Core A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Troika text (supports custom .woff fonts; woff2 not supported) -->
    <script src="https://unpkg.com/aframe-troika-text@0.14.0/dist/aframe-troika-text.min.js"></script>
    <!-- Environment (for quick lighting/ground presets) -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <!-- Movement / locomotion helpers (movement-controls + teleport-controls) -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <!-- Super Hands (grabbing / hand interaction events) -->
    <script src="https://unpkg.com/super-hands@^3.0.0/dist/super-hands.min.js"></script>

    <style>
      @font-face {
        font-family: "Point Blank";
        src: url("assets/fonts/PointBlank.woff2") format("woff2"),
          url("assets/fonts/PointBlank.woff") format("woff");
        font-display: swap;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Point Blank", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }
      #hud,
      #legend {
        position: fixed;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
        letter-spacing: 0.02em;
        backdrop-filter: blur(10px);
        z-index: 10;
      }
      #hud {
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
      }
      #legend {
        right: 20px;
        top: 20px;
        max-width: 260px;
        border-radius: 16px;
        line-height: 1.4;
      }
      #legend h2 {
        font-size: 13px;
        margin: 0 0 4px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #e5e7eb;
      }
      #legend .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        margin-right: 8px;
        margin-bottom: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.8);
      }
      #legend .pill span {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
      }
      #hud strong {
        color: #5dd6ff;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <strong>Meta Quest 3 tips:</strong>
      Use thumbstick or teleport to move. Reach out with your hands to grab
      the ticket and wristband, then queue at security to enter the arena.
    </div>
    <div id="legend">
      <h2>Flow Legend</h2>
      <div class="pill">
        <span style="background:#fb923c"></span> Ticket Stand
      </div>
      <div class="pill">
        <span style="background:#d946ef"></span> Wristband Zone
      </div>
      <div class="pill">
        <span style="background:#ec4899"></span> Security → Arena Path
      </div>
      <div class="pill">
        <span style="background:#22c55e"></span> Seating Access Paths
      </div>
    </div>

    <a-scene
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic;"
      environment="preset: starry; ground: canyon; groundColor: #050816; skyColor: #020617; lighting: distant;"
      webxr="optionalFeatures: hand-tracking, local-floor;"
      background="color: #02030a"
      vr-mode-ui="enabled: true"
      cursor="rayOrigin: mouse"
      fog="type: exponential; color: #020617; density: 0.025"
    >
      <a-assets timeout="60000">
        <a-mixin
          id="zone-label"
          class="pb-text"
          troika-text="value: ; align: center; anchor: center; baseline: center; maxWidth: 5; fontSize: 0.28; color: #ffffff"
          scale="1 1 1"
        ></a-mixin>
        <a-mixin
          id="zone-floor"
          geometry="primitive: box; depth: 4; height: 0.1; width: 6"
          material="color: #202028; metalness: 0.25; roughness: 0.85"
        ></a-mixin>

        <!-- Optional audio (replace URLs with your own hosted files if desired) -->
        <audio
          id="concert-track"
          src="https://cdn.pixabay.com/audio/2022/03/15/audio_608f3cb965.mp3"
          preload="auto"
        ></audio>
        <audio
          id="crowd-ambience"
          src="https://cdn.pixabay.com/audio/2022/03/15/audio_9e4d0d9a2d.mp3"
          preload="auto"
        ></audio>
      </a-assets>

      <!-- Soft lighting for the arena -->
      <a-entity light="type: ambient; intensity: 0.75; color: #d1d5db"></a-entity>
      <a-entity
        light="type: spot; color: #d946ef; intensity: 1.6; angle: 58; castShadow: true"
        position="0 12 0"
        rotation="-90 0 0"
      ></a-entity>
      <a-entity
        light="type: spot; color: #ec4899; intensity: 1.6; angle: 58; castShadow: true"
        position="10 12 10"
        rotation="-90 -45 0"
      ></a-entity>

      <!-- Neon rim lights around the bowl -->
      <a-entity light="type: point; intensity: 1.2; distance: 35; decay: 2; color: #22c55e" position="0 6 -16"></a-entity>
      <a-entity light="type: point; intensity: 1.2; distance: 35; decay: 2; color: #fb923c" position="16 6 0"></a-entity>
      <a-entity light="type: point; intensity: 1.2; distance: 35; decay: 2; color: #d946ef" position="0 6 16"></a-entity>
      <a-entity light="type: point; intensity: 1.2; distance: 35; decay: 2; color: #ec4899" position="-16 6 0"></a-entity>

      <!-- Moving light beams for a simple show -->
      <a-entity id="moving-lights">
        <a-cone
          position="0 6 0"
          radius-bottom="2"
          radius-top="0.1"
          height="10"
          rotation="-70 0 0"
          material="color: #22c55e; opacity: 0.22; transparent: true"
          animation__spin="property: rotation; to: -70 360 0; loop: true; dur: 12000; easing: linear"
        ></a-cone>
        <a-cone
          position="0 6 0"
          radius-bottom="2"
          radius-top="0.1"
          height="10"
          rotation="-70 180 0"
          material="color: #ec4899; opacity: 0.22; transparent: true"
          animation__spin="property: rotation; to: -70 540 0; loop: true; dur: 16000; easing: linear"
        ></a-cone>
      </a-entity>

      <!-- ========================================================= -->
      <!-- CENTRAL 360° STAGE AND SEATING BOWL                       -->
      <!-- ========================================================= -->

      <!-- Circular arena floor -->
      <a-circle
        id="arena-floor"
        radius="18"
        color="#14141f"
        rotation="-90 0 0"
        position="0 0 0"
      ></a-circle>

      <!-- Stage at the exact center (360° performance) -->
      <a-cylinder
        id="stage"
        position="0 0.5 0"
        radius="4"
        height="1"
        color="#3b1b5c"
        material="metalness: 0.6; roughness: 0.2; emissive: #471a75; emissiveIntensity: 0.7"
        animation__pulse="property: material.emissiveIntensity; dir: alternate; from: 0.4; to: 1.1; loop: true; dur: 1800; easing: easeInOutSine"
      ></a-cylinder>

      <!-- Holographic ring above the stage -->
      <a-torus
        position="0 3.5 0"
        radius="5"
        radius-tubular="0.08"
        material="color: #22d3ee; emissive: #22d3ee; emissiveIntensity: 0.9; metalness: 0.8; roughness: 0.1; opacity: 0.7; transparent: true"
        animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 14000; easing: linear"
      ></a-torus>

      <!-- Light towers around stage -->
      <a-entity id="stage-rig">
        <a-box
          position="4 4 0"
          depth="0.2"
          height="8"
          width="0.2"
          color="#151515"
        ></a-box>
        <a-box
          position="-4 4 0"
          depth="0.2"
          height="8"
          width="0.2"
          color="#151515"
        ></a-box>
        <a-box
          position="0 4 4"
          depth="0.2"
          height="8"
          width="0.2"
          color="#151515"
        ></a-box>
        <a-box
          position="0 4 -4"
          depth="0.2"
          height="8"
          width="0.2"
          color="#151515"
        ></a-box>
      </a-entity>

      <!-- Simple ringed seating tiers (abstract seats) with labeled quadrants -->
      <a-ring
        position="0 0.6 0"
        radius-inner="8"
        radius-outer="10"
        rotation="-90 0 0"
        material="color: #222; metalness: 0.25; roughness: 0.9"
      ></a-ring>
      <a-ring
        position="0 1.2 0"
        radius-inner="11"
        radius-outer="13"
        rotation="-90 0 0"
        material="color: #181818; metalness: 0.25; roughness: 0.9"
      ></a-ring>
      <a-ring
        position="0 1.8 0"
        radius-inner="14"
        radius-outer="16"
        rotation="-90 0 0"
        material="color: #101010; metalness: 0.2; roughness: 0.95"
      ></a-ring>

      <!-- Neon seating outlines -->
      <a-torus
        position="0 0.62 0"
        radius="10"
        radius-tubular="0.06"
        material="color: #fb923c; emissive: #fb923c; emissiveIntensity: 0.9; metalness: 0.7; roughness: 0.2"
      ></a-torus>
      <a-torus
        position="0 1.22 0"
        radius="13"
        radius-tubular="0.06"
        material="color: #d946ef; emissive: #d946ef; emissiveIntensity: 0.9; metalness: 0.7; roughness: 0.2"
      ></a-torus>
      <a-torus
        position="0 1.82 0"
        radius="16"
        radius-tubular="0.06"
        material="color: #ec4899; emissive: #ec4899; emissiveIntensity: 0.9; metalness: 0.7; roughness: 0.2"
      ></a-torus>

      <!-- Crowd (spawned via JS for performance + easy recolor) -->
      <a-entity id="crowd" spawn-crowd></a-entity>

      <!-- Section labels around the bowl -->
      <a-entity id="section-labels">
        <a-entity
          position="0 2.4 -15"
          rotation="0 0 0"
          class="pb-text"
          troika-text="value: SECTION A; align: center; maxWidth: 4; fontSize: 0.32; color: #e5e7eb"
        ></a-entity>
        <a-entity
          position="15 2.4 0"
          rotation="0 -90 0"
          class="pb-text"
          troika-text="value: SECTION B; align: center; maxWidth: 4; fontSize: 0.32; color: #e5e7eb"
        ></a-entity>
        <a-entity
          position="0 2.4 15"
          rotation="0 180 0"
          class="pb-text"
          troika-text="value: SECTION C; align: center; maxWidth: 4; fontSize: 0.32; color: #e5e7eb"
        ></a-entity>
        <a-entity
          position="-15 2.4 0"
          rotation="0 90 0"
          class="pb-text"
          troika-text="value: SECTION D; align: center; maxWidth: 4; fontSize: 0.32; color: #e5e7eb"
        ></a-entity>
      </a-entity>

      <!-- Stadium outer bowl and roof structure -->
      <a-entity id="stadium-shell">
        <!-- Outer bowl wall -->
        <a-cylinder
          position="0 4 0"
          radius="20"
          height="8"
          color="#021a3b"
          material="color: #021a3b; emissive: #0f2f6b; emissiveIntensity: 0.4; metalness: 0.4; roughness: 0.85"
          segments-radial="32"
          open-ended="true"
        ></a-cylinder>

        <!-- Upper concourse ring -->
        <a-ring
          position="0 8 0"
          radius-inner="18"
          radius-outer="21"
          rotation="-90 0 0"
          material="color: #0b1120; metalness: 0.5; roughness: 0.6"
        ></a-ring>

        <!-- LED ribbon ring (neon) -->
        <a-torus
          position="0 8.2 0"
          radius="20.8"
          radius-tubular="0.09"
          material="color: #ec4899; emissive: #ec4899; emissiveIntensity: 1.0; metalness: 0.7; roughness: 0.2"
          animation__led="property: material.color; dir: alternate; from: #ec4899; to: #d946ef; dur: 900; loop: true; easing: easeInOutSine"
        ></a-torus>

        <!-- Roof truss ring -->
        <a-torus
          position="0 10.5 0"
          radius="21.5"
          radius-tubular="0.2"
          material="color: #111827; metalness: 0.7; roughness: 0.4"
        ></a-torus>

        <!-- Vertical structural columns (N/E/S/W) -->
        <a-box
          position="0 6 -18"
          width="0.6"
          height="12"
          depth="0.6"
          color="#111827"
        ></a-box>
        <a-box
          position="18 6 0"
          width="0.6"
          height="12"
          depth="0.6"
          color="#111827"
        ></a-box>
        <a-box
          position="0 6 18"
          width="0.6"
          height="12"
          depth="0.6"
          color="#111827"
        ></a-box>
        <a-box
          position="-18 6 0"
          width="0.6"
          height="12"
          depth="0.6"
          color="#111827"
        ></a-box>

        <!-- Scoreboard over one section -->
        <a-plane
          position="0 9 -13"
          rotation="0 0 0"
          width="8"
          height="3"
          color="#020617"
          material="metalness: 0.7; roughness: 0.3"
        ></a-plane>
        <a-entity
          position="0 9 -12.99"
          class="pb-text"
          troika-text="value: LIVE STADIUM SHOW; align: center; maxWidth: 7.5; fontSize: 0.5; color: #e5e7eb; outlineWidth: 0.006; outlineColor: #000000"
        ></a-entity>
      </a-entity>

      <!-- Color-coded crowd control radial paths leading to seats -->
      <a-entity id="crowd-paths">
        <!-- North path -->
        <a-box
          position="0 0.01 -10"
          depth="8"
          height="0.05"
          width="2"
          rotation="0 0 0"
          color="#22c55e"
          material="opacity: 0.7; emissive: #22c55e; emissiveIntensity: 0.5"
        ></a-box>
        <!-- East path -->
        <a-box
          position="10 0.01 0"
          depth="2"
          height="0.05"
          width="8"
          rotation="0 90 0"
          color="#fb923c"
          material="opacity: 0.7; emissive: #fb923c; emissiveIntensity: 0.5"
        ></a-box>
        <!-- South path (from security gate) -->
        <a-box
          position="0 0.01 12"
          depth="10"
          height="0.05"
          width="2"
          rotation="0 0 0"
          color="#ec4899"
          material="opacity: 0.7; emissive: #ec4899; emissiveIntensity: 0.55"
        ></a-box>
        <!-- West path -->
        <a-box
          position="-10 0.01 0"
          depth="2"
          height="0.05"
          width="8"
          rotation="0 90 0"
          color="#d946ef"
          material="opacity: 0.7; emissive: #d946ef; emissiveIntensity: 0.55"
        ></a-box>
      </a-entity>

      <!-- ========================================================= -->
      <!-- FRONT-OF-HOUSE FLOW: ENTRANCE → TICKETS → WRISTBAND → SECURITY -->
      <!-- ========================================================= -->

      <!-- MAIN ENTRANCE (pulled further out like a stadium gate) -->
      <a-entity id="entrance-zone" position="0 0 26">
        <a-entity
          mixin="zone-floor"
          position="0 0 0"
          geometry="primitive: box; width: 14; depth: 6; height: 0.12"
          material="color: #020617; emissive: #0b1025; emissiveIntensity: 0.25"
        ></a-entity>

        <!-- Entrance arch / gate with neon accents -->
        <a-entity position="0 2.2 0">
          <a-box
            position="0 1 0"
            width="10"
            height="0.35"
            depth="0.4"
            color="#d946ef"
            material="emissive: #d946ef; emissiveIntensity: 0.9"
          ></a-box>
          <a-box
            position="-4.6 0 0"
            width="0.55"
            height="2.6"
            depth="0.55"
            color="#0f172a"
          ></a-box>
          <a-box
            position="4.6 0 0"
            width="0.55"
            height="2.6"
            depth="0.55"
            color="#0f172a"
          ></a-box>
          <!-- Side pillars extended for stadium feel -->
          <a-box
            position="-4.6 2.4 0"
            width="0.4"
            height="2.2"
            depth="0.4"
            color="#ec4899"
            material="emissive: #ec4899; emissiveIntensity: 0.8"
          ></a-box>
          <a-box
            position="4.6 2.4 0"
            width="0.4"
            height="2.2"
            depth="0.4"
            color="#22c55e"
            material="emissive: #22c55e; emissiveIntensity: 0.8"
          ></a-box>
        </a-entity>

        <!-- Label -->
        <a-entity
          mixin="zone-label"
          position="0 2.8 0"
          troika-text="value: STADIUM MAIN ENTRANCE; color: #22c55e; fontSize: 0.42; maxWidth: 7; outlineWidth: 0.006; outlineColor: #000000"
        ></a-entity>
        <a-entity
          position="0 1.2 2"
          class="pb-text"
          troika-text="value: START →\nWalk through the gate, then go LEFT for ticket + wristband.; align: center; maxWidth: 6.5; fontSize: 0.26; color: #e5e7eb"
        ></a-entity>
      </a-entity>

      <!-- TICKET BOOKING STAND (left of entrance) -->
      <a-entity id="ticket-zone" position="-9 0 22">
        <a-entity
          mixin="zone-floor"
          position="0 0 0"
          geometry="primitive: box; width: 6.5; depth: 4.5; height: 0.12"
          material="color: #020617; emissive: #1a0f05; emissiveIntensity: 0.25"
        ></a-entity>

        <!-- Booth counter -->
        <a-box
          position="0 1 0"
          width="3.4"
          height="1.6"
          depth="1.2"
          color="#020617"
        ></a-box>
        <a-box
          position="0 1.8 0.5"
          width="3"
          height="0.6"
          depth="0.1"
          color="#fb923c"
          material="emissive: #fb923c; emissiveIntensity: 0.9"
        ></a-box>

        <!-- Floating master ticket object to grab -->
        <a-box
          id="ticket-item"
          class="interactive pickup-ticket"
          position="0 1.35 0.85"
          width="0.45"
          height="0.24"
          depth="0.03"
          color="#fb923c"
          material="metalness: 0.25; roughness: 0.35; emissive: #fb923c; emissiveIntensity: 0.85"
          hoverable
          grabbable
          pickup-ticket
        >
          <a-entity
            position="0 0 0.03"
            class="pb-text"
            troika-text="value: TICKET; align: center; maxWidth: 1.4; fontSize: 0.22; color: #000000"
          ></a-entity>
        </a-box>

        <!-- Four ticket sections: standing / gold / platinum / VIP -->
        <!-- GREEN standing tickets -->
        <a-entity id="ticket-stack-standing" position="-0.9 1.05 0.1">
          <a-box
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#16a34a"
          ></a-box>
          <a-box
            position="0 0.025 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#22c55e"
          ></a-box>
          <a-box
            position="0 0.05 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#4ade80"
          ></a-box>
        </a-entity>

        <!-- ORANGE gold seating tickets -->
        <a-entity id="ticket-stack-gold" position="-0.3 1.05 0.1">
          <a-box
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#ea580c"
          ></a-box>
          <a-box
            position="0 0.025 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#fb923c"
          ></a-box>
          <a-box
            position="0 0.05 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#fed7aa"
          ></a-box>
        </a-entity>

        <!-- PURPLE platinum tickets -->
        <a-entity id="ticket-stack-platinum" position="0.3 1.05 0.1">
          <a-box
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#7e22ce"
          ></a-box>
          <a-box
            position="0 0.025 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#d946ef"
          ></a-box>
          <a-box
            position="0 0.05 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#f5d0fe"
          ></a-box>
        </a-entity>

        <!-- RED VIP tickets -->
        <a-entity id="ticket-stack-vip" position="0.9 1.05 0.1">
          <a-box
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#b91c1c"
          ></a-box>
          <a-box
            position="0 0.025 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#ef4444"
          ></a-box>
          <a-box
            position="0 0.05 0"
            width="0.4"
            height="0.02"
            depth="0.22"
            color="#fecaca"
          ></a-box>
        </a-entity>

        <!-- Label -->
        <a-entity
          mixin="zone-label"
          position="0 2.4 0"
          troika-text="value: TICKET BOOKING; color: #fb923c; fontSize: 0.38; maxWidth: 5.5; outlineWidth: 0.006; outlineColor: #000000"
        ></a-entity>
        <a-entity
          position="0 0.25 1.8"
          class="pb-text"
          troika-text="value: Take your TICKET.\nTicket bundles: GREEN Standing  ORANGE Gold  PURPLE Platinum  RED VIP.; align: center; maxWidth: 5.3; fontSize: 0.22; color: #e5e7eb"
        ></a-entity>

        <!-- Neon edge accents -->
        <a-box
          position="0 0.07 2.25"
          width="6.6"
          height="0.06"
          depth="0.08"
          color="#fb923c"
          material="emissive: #fb923c; emissiveIntensity: 0.9"
        ></a-box>
        <a-box
          position="0 0.07 -2.25"
          width="6.6"
          height="0.06"
          depth="0.08"
          color="#ec4899"
          material="emissive: #ec4899; emissiveIntensity: 0.9"
        ></a-box>
      </a-entity>

      <!-- WRISTBAND ZONE (inside, right of ticket booking) -->
      <a-entity id="wristband-zone" position="-2.5 0 22">
        <a-entity
          mixin="zone-floor"
          position="0 0 0"
          geometry="primitive: box; width: 7; depth: 4.5; height: 0.12"
          material="color: #020617; emissive: #17051a; emissiveIntensity: 0.25"
        ></a-entity>

        <!-- Wristband counter -->
        <a-box
          position="0 1 0"
          width="3"
          height="1.4"
          depth="1"
          color="#020617"
        ></a-box>

        <!-- Four wristband types on the stand -->
        <!-- Green: Standing -->
        <a-torus
          id="band-standing"
          class="interactive"

    <script>
      // ============================================================
      // PLAYER STATE COMPONENT (ticket, wristband, security cleared)
      // ============================================================
      AFRAME.registerComponent("player-state", {
        schema: {
          hasTicket: { type: "boolean", default: false },
          hasWristband: { type: "boolean", default: false },
          clearedSecurity: { type: "boolean", default: false },
          wristbandType: { type: "string", default: "" },
        },
      });

      function updateStatusBoard(message) {
        const boardText = document.querySelector("#status-text");
        if (!boardText) return;
        boardText.setAttribute("text", "value", message);
      }

      function playAmbientAudio() {
        const concert = document.querySelector("#concert-track");
        const crowd = document.querySelector("#crowd-ambience");
        if (concert && concert.paused) {
          concert.loop = true;
          concert.volume = 0.75;
          concert.play().catch(() => {});
        }
        if (crowd && crowd.paused) {
          crowd.loop = true;
          crowd.volume = 0.4;
          crowd.play().catch(() => {});
        }
      }

      function setHUDMode(mode) {
        const hud = document.getElementById("hud");
        if (!hud) return;
        if (mode === "desktop") {
          hud.innerHTML =
            '<strong>Desktop mode:</strong> Use WASD + mouse to move and look. Click on objects to interact.';
        } else if (mode === "vr") {
          hud.innerHTML =
            '<strong>VR mode (Quest):</strong> Use thumbsticks / teleport to move. Reach out with hands or controllers to grab and interact.';
        }
      }

      // ============================================================
      // INTERACTION: PICK UP TICKET
      // ============================================================
      AFRAME.registerComponent("pickup-ticket", {
        init: function () {
          const el = this.el;
          const rig = document.querySelector("#player-rig");
          if (!rig) return;

          const markTicketCollected = () => {
            const state = rig.getAttribute("player-state") || {};
            if (state.hasTicket) return;

            rig.setAttribute("player-state", "hasTicket", true);
            el.setAttribute("visible", false);
            updateStatusBoard(
              "Ticket collected.\nNext: Move to the WRISTBAND ZONE (orange) on the right."
            );
          };

          // Use super-hands events (grab-start) for hand interaction
          el.addEventListener("grab-start", markTicketCollected);
          // Also allow simple click (desktop or controller trigger)
          el.addEventListener("click", markTicketCollected);
        },
      });

      // ============================================================
      // INTERACTION: PICK UP WRISTBAND (4 types)
      // ============================================================
      AFRAME.registerComponent("pickup-wristband", {
        schema: {
          bandType: { type: "string", default: "" }, // standing, gold, platinum, vip
        },
        init: function () {
          const el = this.el;
          const rig = document.querySelector("#player-rig");
          if (!rig) return;

          const markWristbandCollected = () => {
            const state = rig.getAttribute("player-state") || {};
            if (state.hasWristband) return;

            // Hide all other wristbands, keep only the selected one visible
            const allBands = document.querySelectorAll("[pickup-wristband]");
            allBands.forEach((bandEl) => {
              bandEl.setAttribute("visible", bandEl === el);
            });

            const bandType = this.data.bandType || "standing";
            rig.setAttribute("player-state", "hasWristband", true);
            rig.setAttribute("player-state", "wristbandType", bandType);

            // Move a persona forward towards the security check
            const persona = document.querySelector("#persona");
            if (persona) {
              persona.emit("persona-go", { bandType });
            }

            let tierLabel = "Standing (Floor)";
            if (bandType === "gold") tierLabel = "Gold Seating";
            if (bandType === "platinum") tierLabel = "Platinum Seating";
            if (bandType === "vip") tierLabel = "VIP Seating";

            let nextMessage = `Wristband selected: ${tierLabel}.\nNext: Queue at SECURITY with ticket + wristband.`;
            if (!state.hasTicket) {
              nextMessage =
                "Wristband selected.\nYou still need a TICKET from the ticket stand on the left.";
            }
            updateStatusBoard(nextMessage);
          };

          // Pinch / grab with right hand or controller
          el.addEventListener("grab-start", markWristbandCollected);
          // Desktop / mouse click
          el.addEventListener("click", markWristbandCollected);
          // Programmatic selection (right-hand pinch selector dispatches this)
          el.addEventListener("wristband-select", markWristbandCollected);
        },
      });

      // ============================================================
      // SECURITY GATE LOGIC (checks that player has ticket + wristband)
      // ============================================================
      AFRAME.registerComponent("security-gate", {
        init: function () {
          this.playerRig = document.querySelector("#player-rig");
          this.gate = document.querySelector("#security-gate");
          this.opened = false;

          if (!this.gate) return;

          const tryOpen = () => {
            if (this.opened || !this.playerRig) return;

            const state = this.playerRig.getAttribute("player-state") || {};
            if (state.hasTicket && state.hasWristband) {
              this.openGate();
            } else {
              this.showDenied();
            }
          };

          // Trigger when hands hover or user clicks on the gate
          this.gate.addEventListener("hover-start", tryOpen);
          this.gate.addEventListener("click", tryOpen);
        },

        openGate: function () {
          if (!this.gate || this.opened) return;
          this.opened = true;
          this.playerRig.setAttribute("player-state", "clearedSecurity", true);

          // Animate the gate sliding upwards to "open"
          this.gate.setAttribute("animation__open", {
            property: "position",
            to: "0 3 -1.2",
            dur: 900,
            easing: "easeOutQuad",
          });
          this.gate.setAttribute("material", "color", "#22c55e");
          this.gate.setAttribute("material", "emissive", "#22c55e");
          this.gate.setAttribute("material", "emissiveIntensity", 0.95);

          updateStatusBoard(
            "Security cleared.\nFollow the BLUE path into the 360° arena and choose a SECTION (A–D)."
          );
        },

        showDenied: function () {
          if (!this.gate) return;
          this.gate.setAttribute("material", "color", "#ef4444");
          this.gate.setAttribute("material", "emissive", "#ef4444");
          this.gate.setAttribute("material", "emissiveIntensity", 0.9);
          updateStatusBoard(
            "You must have BOTH a ticket and wristband before entering security.\nCollect them at the TICKET and WRISTBAND zones."
          );
        },
      });

      // ============================================================
      // OPTIONAL: SNAP PLAYER A LITTLE FORWARD WHEN SECURITY CLEARED
      // (simple crowd-control movement into the arena bowl)
      // ============================================================
      AFRAME.registerComponent("auto-step-forward", {
        schema: { distance: { type: "number", default: 3 } },
        init: function () {
          const rig = document.querySelector("#player-rig");
          if (!rig) return;

          this.rig = rig;
          this.hasStepped = false;

          rig.addEventListener("componentchanged", (evt) => {
            if (evt.detail.name !== "player-state" || this.hasStepped) return;
            const state = rig.getAttribute("player-state") || {};
            if (state.clearedSecurity && !this.hasStepped) {
              this.stepIntoArena();
            }
          });
        },
        stepIntoArena: function () {
          if (!this.rig || this.hasStepped) return;
          this.hasStepped = true;

          const pos = this.rig.getAttribute("position");
          const newPos = {
            x: pos.x,
            y: pos.y,
            z: pos.z - this.data.distance,
          };

          this.rig.setAttribute("animation__step", {
            property: "position",
            to: `${newPos.x} ${newPos.y} ${newPos.z}`,
            dur: 800,
            easing: "easeOutQuad",
          });
        },
      });

      // ============================================================
      // CONTROL PROFILE (switch between desktop and VR-focused controls)
      // ============================================================
      AFRAME.registerComponent("control-profile", {
        schema: {
          mode: { type: "string", default: "desktop" },
        },
        init: function () {
          this.scene = this.el.sceneEl;
          this.desktopReticle = document.querySelector("#desktop-reticle");
          setHUDMode(this.data.mode);

          // Auto-switch based on entering/exiting VR
          if (this.scene) {
            this.scene.addEventListener("enter-vr", () => {
              this.el.setAttribute("control-profile", "mode", "vr");
            });
            this.scene.addEventListener("exit-vr", () => {
              this.el.setAttribute("control-profile", "mode", "desktop");
            });
          }
        },
        update: function () {
          const mode = this.data.mode;
          const scene = this.scene || this.el.sceneEl;
          if (!scene) return;

          setHUDMode(mode);

          if (this.desktopReticle) {
            const enable = mode === "desktop";
            this.desktopReticle.setAttribute("visible", enable);
            this.desktopReticle.setAttribute("cursor", "enabled", enable);
            this.desktopReticle.setAttribute("raycaster", "enabled", enable);
          }
        },
      });

      // Simple component to attach to settings buttons
      AFRAME.registerComponent("control-switch", {
        schema: {
          mode: { type: "string", default: "desktop" },
        },
        init: function () {
          const el = this.el;
          el.addEventListener("click", () => {
            const rig = document.querySelector("#player-rig");
            if (!rig) return;
            rig.setAttribute("control-profile", "mode", this.data.mode);
          });
        },
      });

      // ============================================================
      // RIGHT HAND PINCH SELECTOR (Quest hand-tracking)
      // Pinch (index+thumb) near a wristband to select it.
      // ============================================================
      AFRAME.registerComponent("right-hand-pinch-selector", {
        schema: {
          targets: { type: "string", default: "[pickup-wristband]" },
          maxDistance: { type: "number", default: 0.28 },
        },
        init: function () {
          this._onPinch = this.onPinch.bind(this);
          // A-Frame hand-tracking-controls commonly emits pinchstarted/pinchended.
          this.el.addEventListener("pinchstarted", this._onPinch);
          this.el.addEventListener("pinchstart", this._onPinch);
        },
        onPinch: function () {
          const scene = this.el.sceneEl;
          if (!scene) return;

          const handWorld = new THREE.Vector3();
          const bandWorld = new THREE.Vector3();
          this.el.object3D.getWorldPosition(handWorld);

          let closest = null;
          let closestD = Infinity;

          const bands = scene.querySelectorAll(this.data.targets);
          bands.forEach((bandEl) => {
            if (!bandEl || bandEl.getAttribute("visible") === false) return;
            bandEl.object3D.getWorldPosition(bandWorld);
            const d = handWorld.distanceTo(bandWorld);
            if (d < closestD) {
              closestD = d;
              closest = bandEl;
            }
          });

          if (closest && closestD <= this.data.maxDistance) {
            closest.emit("wristband-select");
          }
        },
      });

      // ============================================================
      // PERSONA QUEUE (spawns at wristband station and walks to queue)
      // ============================================================
      AFRAME.registerComponent("persona-queue", {
        init: function () {
          this.body = this.el.querySelector("#persona-body");
          this.wristbandZone = document.querySelector("#wristband-zone");
          this.securityZone = document.querySelector("#security-zone");

          this.el.addEventListener("persona-go", (evt) => {
            const bandType = evt?.detail?.bandType || "standing";
            const colorByType = {
              standing: "#22c55e",
              gold: "#fb923c",
              platinum: "#d946ef",
              vip: "#ef4444",
            };
            const c = colorByType[bandType] || "#22c55e";
            if (this.body) {
              this.body.setAttribute("color", c);
              this.body.setAttribute("material", "emissive", c);
              this.body.setAttribute("material", "emissiveIntensity", 0.35);
            }

            const start = new THREE.Vector3(-2.5, 0, 22);
            if (this.wristbandZone) {
              this.wristbandZone.object3D.getWorldPosition(start);
            }

            // Queue start point (just behind the lanes)
            const queue = new THREE.Vector3(0, 0, 16.2);
            if (this.securityZone) {
              this.securityZone.object3D.getWorldPosition(queue);
              queue.z += 1.2;
            }

            this.el.setAttribute("visible", true);
            this.el.setAttribute("position", `${start.x} 0 ${start.z}`);
            this.el.setAttribute("rotation", "0 180 0");

            // Walk animation (position)
            this.el.setAttribute("animation__walk", {
              property: "position",
              to: `${queue.x} 0 ${queue.z}`,
              dur: 2400,
              easing: "easeInOutSine",
            });

            // Subtle bobbing while walking
            this.el.setAttribute("animation__bob", {
              property: "position.y",
              dir: "alternate",
              from: 0,
              to: 0.03,
              dur: 350,
              loop: true,
              easing: "easeInOutSine",
            });
          });
        },
      });

      // ============================================================
      // CROWD SPAWNER (heads light brown; bodies by ticket tier color)
      // ============================================================
      AFRAME.registerComponent("spawn-crowd", {
        init: function () {
          const headColor = "#c8a27a";
          const tiers = [
            { name: "standing", count: 40, rMin: 6.2, rMax: 8.2, body: "#22c55e" },
            { name: "gold", count: 35, rMin: 9.2, rMax: 11.2, body: "#fb923c" },
            { name: "platinum", count: 30, rMin: 12.2, rMax: 14.2, body: "#d946ef" },
            { name: "vip", count: 22, rMin: 14.8, rMax: 16.2, body: "#ef4444" },
          ];

          // Deterministic pseudo-random for stable placement
          let seed = 1337;
          const rand = () => {
            seed = (seed * 16807) % 2147483647;
            return (seed - 1) / 2147483646;
          };

          tiers.forEach((tier) => {
            for (let i = 0; i < tier.count; i++) {
              const theta = rand() * Math.PI * 2;
              const r = tier.rMin + rand() * (tier.rMax - tier.rMin);
              const x = Math.cos(theta) * r;
              const z = Math.sin(theta) * r;

              const person = document.createElement("a-entity");
              person.setAttribute("position", `${x} 0 ${z}`);
              person.setAttribute("rotation", `0 ${(-theta * 180) / Math.PI + 90} 0`);

              const body = document.createElement("a-cylinder");
              body.setAttribute("position", "0 0.45 0");
              body.setAttribute("radius", "0.16");
              body.setAttribute("height", "0.9");
              body.setAttribute("color", tier.body);
              body.setAttribute(
                "material",
                `emissive: ${tier.body}; emissiveIntensity: 0.25; roughness: 0.5`
              );

              const head = document.createElement("a-sphere");
              head.setAttribute("position", "0 1.05 0");
              head.setAttribute("radius", "0.18");
              head.setAttribute("color", headColor);
              head.setAttribute("material", "roughness: 0.9");

              person.appendChild(body);
              person.appendChild(head);

              // Subtle sway to feel alive
              person.setAttribute("animation__sway", {
                property: "rotation",
                dir: "alternate",
                from: `0 ${(-theta * 180) / Math.PI + 85} 0`,
                to: `0 ${(-theta * 180) / Math.PI + 95} 0`,
                dur: 1200 + rand() * 800,
                loop: true,
                easing: "easeInOutSine",
              });

              this.el.appendChild(person);
            }
          });
        },
      });

      // Attach auto-step-forward behavior to the scene after components are defined
      document.addEventListener("DOMContentLoaded", function () {
        // If Point Blank font is available as .woff (Troika supports woff, not woff2),
        // apply it to all troika-text entities so it works on Quest + laptops.
        const pbWoff = "assets/fonts/PointBlank.woff";
        fetch(pbWoff, { method: "HEAD" })
          .then((r) => {
            if (!r.ok) throw new Error("Font not found");
            const texts = document.querySelectorAll("[troika-text]");
            texts.forEach((el) => {
              el.setAttribute("troika-text", "font", pbWoff);
            });
          })
          .catch(() => {
            // Keep default font if Point Blank isn't provided yet.
          });

        const rig = document.querySelector("#player-rig");
        if (rig && !rig.hasAttribute("auto-step-forward")) {
          rig.setAttribute("auto-step-forward", "distance: 3");
        }
      });
    </script>
  </body>
</html>
