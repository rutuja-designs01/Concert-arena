<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARENA LIVE — WebXR Concert Experience</title>

  <!-- A-Frame 1.5.0 -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
  <!-- A-Frame Extras (locomotion, teleport) -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }

    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loading-title {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.3em;
      color: #fff;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2s linear infinite;
    }
    .loading-sub {
      margin-top: 1.5rem;
      font-size: 1rem;
      letter-spacing: 0.5em;
      color: #666;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loading-bar-wrap {
      margin-top: 2.5rem;
      width: 300px; height: 2px;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      animation: loadbar 2.5s ease forwards;
    }
    @keyframes shimmer {
      to { background-position: 200% center; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
    }
    @keyframes loadbar {
      from { width: 0; } to { width: 100%; }
    }

    #controls-hint {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.75);
      border: 1px solid #333;
      padding: 10px 24px;
      border-radius: 4px;
      color: #aaa;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }

    #click-to-start {
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
    }
    #click-to-start h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    #click-to-start p {
      color: #888;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 2;
      text-align: center;
    }
    #click-to-start .key {
      display: inline-block;
      background: #222;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 2px 10px;
      color: #ff00ff;
      font-size: 0.9rem;
      margin: 0 3px;
    }
    #click-to-start .start-btn {
      margin-top: 2rem;
      padding: 14px 42px;
      background: transparent;
      border: 2px solid #ff00ff;
      color: #ff00ff;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    #click-to-start .start-btn:hover {
      background: #ff00ff;
      color: #000;
    }
  </style>
</head>
<body>

<!-- NAVIGATION INSTRUCTIONS
  DESKTOP: WASD to move | Mouse click+drag to look | Click "Enter VR" button for immersive mode
  META QUEST 3S: Left thumbstick to move | Right thumbstick to turn | Right trigger to teleport
  Teleport targets are all floor surfaces (class="floor")
-->

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loading-title">ARENA LIVE</div>
  <div class="loading-sub">Loading Experience</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<!-- Click to start overlay -->
<div id="click-to-start" style="display:none">
  <h2>🎸 Enter Arena</h2>
  <p>
    Move &nbsp;<span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> or <span class="key">↑ ↓ ← →</span><br>
    Look around &nbsp;<span class="key">Mouse drag</span><br>
    Speed boost &nbsp;<span class="key">Shift</span>
  </p>
  <button class="start-btn" id="enter-btn">ENTER THE ARENA</button>
</div>

<div id="controls-hint" style="display:none">
  W/A/S/D = Move &nbsp;|&nbsp; Mouse Drag = Look &nbsp;|&nbsp; Arrow Keys = Move &nbsp;|&nbsp; Shift = Run
</div>

<!-- =====================================================================
     A-FRAME SCENE
     ===================================================================== -->
<a-scene
  vr-mode-ui="enabled: true"
  renderer="antialias: true; colorManagement: true; sortObjects: true"
  shadow="type: pcfsoft"
  loading-screen="enabled: false">

  <!-- ── ASSETS ── -->
  <a-assets>
    <!-- Audio placeholders: replace src with actual audio URLs -->
    <!-- <a-sound id="crowd-ambient" src="URL_TO_CROWD_MURMUR.mp3" loop="true" autoplay="true"></a-sound> -->
    <!-- <a-sound id="security-beep" src="URL_TO_BEEP.mp3" loop="true" autoplay="true"></a-sound> -->
  </a-assets>

  <!-- ── LIGHTING ── -->
  <a-light type="ambient"     color="#ffffff" intensity="0.35"></a-light>
  <a-light type="directional" color="#ffe5cc" intensity="0.6"  position="-1 4 -3" castShadow="true"></a-light>
  <!-- Stage key spot -->
  <a-light type="spot" color="#ffffff" intensity="2.5" position="0 18 0" target="#stage-platform" angle="35" penumbra="0.3"></a-light>
  <!-- Entrance warm fill -->
  <a-light type="point" color="#ffaa44" intensity="0.8" position="0 4 -55" distance="20"></a-light>
  <!-- Security cold fill -->
  <a-light type="point" color="#4488ff" intensity="0.7" position="0 4 -22" distance="18"></a-light>
  <!-- Concourse fill -->
  <a-light type="point" color="#ffffff" intensity="0.5" position="0 5 -10" distance="25"></a-light>
  <!-- Animated stage lights (4 corners) -->
  <a-light type="point" id="stagelight1" color="#ff00ff" intensity="1.5" position=" 10 12  10" distance="30">
    <a-animation attribute="light.color" from="#ff00ff" to="#00ffff" dur="3000" direction="alternate" repeat="indefinite"></a-animation>
  </a-light>
  <a-light type="point" id="stagelight2" color="#00ffff" intensity="1.5" position="-10 12  10" distance="30">
    <a-animation attribute="light.color" from="#00ffff" to="#ffcc00" dur="4000" direction="alternate" repeat="indefinite"></a-animation>
  </a-light>
  <a-light type="point" id="stagelight3" color="#ffcc00" intensity="1.5" position=" 10 12 -10" distance="30">
    <a-animation attribute="light.color" from="#ffcc00" to="#ff00ff" dur="3500" direction="alternate" repeat="indefinite"></a-animation>
  </a-light>
  <a-light type="point" id="stagelight4" color="#ff3300" intensity="1.5" position="-10 12 -10" distance="30">
    <a-animation attribute="light.color" from="#ff3300" to="#00ffff" dur="2500" direction="alternate" repeat="indefinite"></a-animation>
  </a-light>

  <!-- ── SKY ── -->
  <a-sky color="#04000f"></a-sky>

  <!-- ================================================================
       CAMERA RIG — starts just inside main entrance
       ================================================================ -->
  <a-entity id="rig" position="0 0 -58">
    <a-entity
      id="camera"
      camera="fov: 80"
      look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: false"
      wasd-controls="acceleration: 30; fly: false"
      position="0 1.6 0">
    </a-entity>

    <!-- LEFT HAND (Quest) -->
    <a-entity
      id="leftHand"
      laser-controls="hand: left"
      teleport-controls="cameraRig: #rig; teleportOrigin: #camera; button: thumbstickup; collisionEntities: .floor; landingNormal: 0 1 0"
      raycaster="objects: .floor">
    </a-entity>

    <!-- RIGHT HAND (Quest) -->
    <a-entity
      id="rightHand"
      laser-controls="hand: right"
      teleport-controls="cameraRig: #rig; teleportOrigin: #camera; button: trigger; collisionEntities: .floor; landingNormal: 0 1 0"
      raycaster="objects: .floor">
    </a-entity>
  </a-entity>

  <!-- ================================================================
       OUTER ARENA STRUCTURE
       ================================================================ -->
  <!-- Outer wall cylinder (inside-facing) -->
  <a-cylinder
    radius="33"
    height="22"
    position="0 11 0"
    material="color: #0e0e1c; side: back; roughness: 0.95"
    segments-radial="32">
  </a-cylinder>

  <!-- Arena dome roof -->
  <a-sphere
    radius="36"
    position="0 2 0"
    material="color: #090912; side: back; roughness: 1"
    theta-start="0"
    theta-length="90"
    segments-height="12"
    segments-width="32">
  </a-sphere>

  <!-- Structural pillars (every 45deg) -->
  <a-entity id="pillars">
    <a-cylinder radius="0.55" height="20" position=" 32  10   0"  material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position="-32  10   0"  material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position="  0  10  32"  material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position="  0  10 -32"  material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position=" 22.6 10  22.6" material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position="-22.6 10  22.6" material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position=" 22.6 10 -22.6" material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
    <a-cylinder radius="0.55" height="20" position="-22.6 10 -22.6" material="color: #1a1a2e; metalness:0.6; roughness:0.4" segments-radial="8"></a-cylinder>
  </a-entity>

  <!-- Ceiling lighting rig (slow rotate) -->
  <a-torus id="ceiling-rig" radius="16" tube="0.25" position="0 14 0"
    material="color: #222233; metalness:0.8; roughness:0.3"
    segments-tubular="32">
    <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="60000" repeat="indefinite" easing="linear"></a-animation>
  </a-torus>
  <!-- Rig light orbs -->
  <a-entity id="rig-orbs">
    <a-sphere radius="0.3" position=" 16   14   0"  material="color:#ffffff; emissive:#ffffff; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position="-16   14   0"  material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position="  0   14  16"  material="color:#00ffff; emissive:#00ffff; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position="  0   14 -16"  material="color:#ffcc00; emissive:#ffcc00; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position=" 11.3 14  11.3" material="color:#ffffff; emissive:#ffffff; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position="-11.3 14  11.3" material="color:#ff3300; emissive:#ff3300; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position=" 11.3 14 -11.3" material="color:#00ffff; emissive:#00ffff; emissiveIntensity:1"></a-sphere>
    <a-sphere radius="0.3" position="-11.3 14 -11.3" material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:1"></a-sphere>
  </a-entity>

  <!-- ================================================================
       ENTRANCE APPROACH CORRIDOR (exterior approach, Z: -70 to -45)
       ================================================================ -->
  <!-- Side walls of approach corridor -->
  <a-box width="0.5" height="6" depth="28" position=" 6 3 -57" material="color:#0d0d1f; roughness:0.9"></a-box>
  <a-box width="0.5" height="6" depth="28" position="-6 3 -57" material="color:#0d0d1f; roughness:0.9"></a-box>

  <!-- ================================================================
       1. MAIN ENTRANCE PLAZA  (Z: -60 to -45)
       ================================================================ -->
  <!-- Floor -->
  <a-box class="floor" width="14" height="0.1" depth="18" position="0 0 -52"
    material="color:#1a1a2e; roughness:0.85; metalness:0.1"></a-box>

  <!-- Arch left leg -->
  <a-box width="1" height="8" depth="1" position="-5 4 -44"
    material="color:#141428; roughness:0.6; metalness:0.4"></a-box>
  <!-- Arch right leg -->
  <a-box width="1" height="8" depth="1" position=" 5 4 -44"
    material="color:#141428; roughness:0.6; metalness:0.4"></a-box>
  <!-- Arch lintel -->
  <a-box width="12" height="1.2" depth="1" position="0 8.4 -44"
    material="color:#141428; roughness:0.6; metalness:0.4"></a-box>
  <!-- Neon trim on arch legs -->
  <a-box width="0.12" height="8" depth="0.12" position="-4.5 4 -43.5" material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:1.5"></a-box>
  <a-box width="0.12" height="8" depth="0.12" position=" 4.5 4 -43.5" material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:1.5"></a-box>
  <a-box width="12" height="0.12" depth="0.12" position="0 8.9 -43.5"  material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:1.5"></a-box>

  <!-- ARENA LIVE marquee -->
  <a-text value="ARENA LIVE" position="0 10 -44" align="center" width="9"
    material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:2"
    color="#ff00ff" font="mozillavr"></a-text>

  <!-- Animated entrance spotlights -->
  <a-entity position="-4 7 -50">
    <a-light type="spot" color="#ff00ff" intensity="1.5" angle="20" penumbra="0.5"></a-light>
    <a-animation attribute="rotation" from="0 0 -20" to="0 0 20" dur="3000" direction="alternate" repeat="indefinite"></a-animation>
  </a-entity>
  <a-entity position="4 7 -50">
    <a-light type="spot" color="#00ffff" intensity="1.5" angle="20" penumbra="0.5"></a-light>
    <a-animation attribute="rotation" from="0 0 20" to="0 0 -20" dur="3000" direction="alternate" repeat="indefinite"></a-animation>
  </a-entity>

  <!-- LED Billboards (left and right of entrance) -->
  <a-plane id="billboard-left" width="4" height="7" position="-9 4.5 -52" rotation="0 25 0"
    material="color:#ff00ff; emissive:#ff00ff; emissiveIntensity:0.9; roughness:0.2">
    <a-animation attribute="material.emissive" from="#ff00ff" to="#00ffff" dur="4000" direction="alternate" repeat="indefinite"></a-animation>
  </a-plane>
  <a-text value="TONIGHT&#10;ON STAGE" position="0 0 0.01" align="center" width="3.5" color="#ffffff" font="mozillavr"></a-text>

  <a-plane id="billboard-right" width="4" height="7" position=" 9 4.5 -52" rotation="0 -25 0"
    material="color:#00ffff; emissive:#00ffff; emissiveIntensity:0.9; roughness:0.2">
    <a-animation attribute="material.emissive" from="#00ffff" to="#ff3300" dur="4000" direction="alternate" repeat="indefinite"></a-animation>
  </a-plane>

  <!-- Rope stanchions guiding inward -->
  <a-cylinder radius="0.07" height="1.1" position="-4 0.55 -48" material="color:#999; metalness:0.9; roughness:0.2"></a-cylinder>
  <a-cylinder radius="0.07" height="1.1" position="-4 0.55 -52" material="color:#999; metalness:0.9; roughness:0.2"></a-cylinder>
  <a-cylinder radius="0.07" height="1.1" position="-4 0.55 -56" material="color:#999; metalness:0.9; roughness:0.2"></a-cylinder>
  <a-box width="0.05" height="0.05" depth="8" position="-4 0.85 -52" material="color:#cc0000; emissive:#cc0000; emissiveIntensity:0.6"></a-box>
  <a-cylinder radius="0.07" height="1.1" position=" 4 0.55 -48" material="color:#999; metalness:0.9; roughness:0.2"></a-cylinder>
  <a-cylinder radius="0.07" height="1.1" position=" 4 0.55 -52" material="color:#999; metalness:0.9; roughness:0.2"></a-cylinder>
  <a-cylinder radius="0.07" height="1.1" position=" 4 0.55 -56" material="color:#999; metalness:0.9; roughness:0.2"></a-cylinder>
  <a-box width="0.05" height="0.05" depth="8" position=" 4 0.85 -52" material="color:#cc0000; emissive:#cc0000; emissiveIntensity:0.6"></a-box>

  <!-- ================================================================
       2. TICKET BOOKING STAND  (Z: -42 to -36)
       ================================================================ -->
  <a-box class="floor" width="14" height="0.1" depth="8" position="0 0 -39"
    material="color:#151520; roughness:0.9"></a-box>

  <!-- Overhead sign -->
  <a-text value="TICKET COLLECTION &amp; BOOKING" position="0 5.5 -38" align="center" width="8"
    color="#ffcc00" font="mozillavr"
    material="color:#ffcc00; emissive:#ffcc00; emissiveIntensity:1.5"></a-text>

  <!-- Three kiosks -->
  <!-- Kiosk 1 -->
  <a-box width="1.2" height="2.5" depth="1" position="-3.5 1.25 -38"
    material="color:#1c1c30; roughness:0.7; metalness:0.3"></a-box>
  <a-plane width="0.9" height="0.6" position="-3.5 1.6 -37.51"
    material="color:#003366; opacity:0.8; transparent:true; emissive:#003366; emissiveIntensity:0.5"></a-plane>
  <a-text value="TICKET&#10;COUNTER 1" position="-3.5 2.8 -37.9" align="center" width="2" color="#ffcc00" font="mozillavr"></a-text>
  <a-plane width="0.8" height="0.35" position="-3.5 0.9 -37.51"
    material="color:#00ff88; emissive:#00ff88; emissiveIntensity:0.8"></a-plane>

  <!-- Kiosk 2 -->
  <a-box width="1.2" height="2.5" depth="1" position="0 1.25 -38"
    material="color:#1c1c30; roughness:0.7; metalness:0.3"></a-box>
  <a-plane width="0.9" height="0.6" position="0 1.6 -37.51"
    material="color:#003366; opacity:0.8; transparent:true; emissive:#003366; emissiveIntensity:0.5"></a-plane>
  <a-text value="TICKET&#10;COUNTER 2" position="0 2.8 -37.9" align="center" width="2" color="#ffcc00" font="mozillavr"></a-text>
  <a-plane width="0.8" height="0.35" position="0 0.9 -37.51"
    material="color:#00ff88; emissive:#00ff88; emissiveIntensity:0.8"></a-plane>

  <!-- Kiosk 3 -->
  <a-box width="1.2" height="2.5" depth="1" position=" 3.5 1.25 -38"
    material="color:#1c1c30; roughness:0.7; metalness:0.3"></a-box>
  <a-plane width="0.9" height="0.6" position=" 3.5 1.6 -37.51"
    material="color:#003366; opacity:0.8; transparent:true; emissive:#003366; emissiveIntensity:0.5"></a-plane>
  <a-text value="TICKET&#10;COUNTER 3" position=" 3.5 2.8 -37.9" align="center" width="2" color="#ffcc00" font="mozillavr"></a-text>
  <a-plane width="0.8" height="0.35" position=" 3.5 0.9 -37.51"
    material="color:#00ff88; emissive:#00ff88; emissiveIntensity:0.8"></a-plane>

  <!-- SOLD OUT side panel -->
  <a-plane width="2.5" height="0.8" position="-6 2.5 -38" rotation="0 30 0"
    material="color:#ff0000; emissive:#ff0000; emissiveIntensity:1.2">
  </a-plane>
  <a-text value="TONIGHT: SOLD OUT" position="-6 2.5 -37.8" rotation="0 30 0" align="center" width="3" color="#ffffff" font="mozillavr"></a-text>

  <!-- Queue lane floor stripes -->
  <a-box width="0.15" height="0.02" depth="6" position="-1.8 0.06 -39" material="color:#FFD700; emissive:#FFD700; emissiveIntensity:0.5"></a-box>
  <a-box width="0.15" height="0.02" depth="6" position=" 1.8 0.06 -39" material="color:#FFD700; emissive:#FFD700; emissiveIntensity:0.5"></a-box>

  <!-- ================================================================
       3. WRISTBAND ZONE  (Z: -34 to -28)
       ================================================================ -->
  <a-box class="floor" width="14" height="0.1" depth="8" position="0 0 -31"
    material="color:#141420; roughness:0.9"></a-box>

  <!-- Overhead sign -->
  <a-text value="WRISTBAND COLLECTION" position="0 5 -30" align="center" width="7"
    color="#00ffff" font="mozillavr"
    material="color:#00ffff; emissive:#00ffff; emissiveIntensity:2">
  </a-text>

  <!-- Counter table -->
  <a-box width="10" height="0.12" depth="1" position="0 1.05 -31"
    material="color:#111122; roughness:0.8">
    <!-- Cyan edge trim -->
  </a-box>
  <a-box width="10" height="0.08" depth="0.06" position="0 1.12 -30.53"
    material="color:#00ffff; emissive:#00ffff; emissiveIntensity:1.5"></a-box>
  <a-box width="10" height="1.0" depth="0.9" position="0 0.5 -31"
    material="color:#1a1a2e; roughness:0.7"></a-box>

  <!-- Wristband tier display behind counter -->
  <a-box width="10" height="3" depth="0.4" position="0 1.5 -32"
    material="color:#0d0d1f; roughness:0.9"></a-box>
  <!-- Gold VIP strips -->
  <a-box width="1.5" height="0.2" depth="0.1" position="-3 2.2 -31.8" material="color:#ffcc00; emissive:#ffcc00; emissiveIntensity:1"></a-box>
  <a-box width="1.5" height="0.2" depth="0.1" position="-3 1.9 -31.8" material="color:#ffcc00; emissive:#ffcc00; emissiveIntensity:1"></a-box>
  <!-- Blue Standard strips -->
  <a-box width="1.5" height="0.2" depth="0.1" position=" 0 2.2 -31.8" material="color:#2980b9; emissive:#2980b9; emissiveIntensity:1"></a-box>

<!-- ================================================================
     CONTROLS + LOADING JS
     ================================================================ -->
<script>
  const scene        = document.querySelector('a-scene');
  const loadingScreen = document.getElementById('loading-screen');
  const clickToStart  = document.getElementById('click-to-start');
  const controlsHint  = document.getElementById('controls-hint');
  const enterBtn      = document.getElementById('enter-btn');

  // ── Hide loader, show click-to-start ──
  function onSceneLoaded() {
    loadingScreen.classList.add('hidden');
    setTimeout(() => {
      loadingScreen.style.display = 'none';
      clickToStart.style.display = 'flex';
    }, 1200);
  }

  if (scene.hasLoaded) { onSceneLoaded(); }
  else { scene.addEventListener('loaded', onSceneLoaded); }

  // ── Enter button dismisses overlay and activates controls ──
  function startExperience() {
    clickToStart.style.opacity = '0';
    clickToStart.style.transition = 'opacity 0.5s';
    setTimeout(() => { clickToStart.style.display = 'none'; }, 500);

    controlsHint.style.display = 'block';
    controlsHint.style.opacity = '1';

    // Focus the canvas so keyboard events fire
    const canvas = scene.canvas;
    if (canvas) canvas.focus();

    // Auto-hide hint after 6s
    setTimeout(() => {
      controlsHint.style.transition = 'opacity 1s';
      controlsHint.style.opacity = '0';
      setTimeout(() => { controlsHint.style.display = 'none'; }, 1000);
    }, 6000);
  }

  enterBtn.addEventListener('click', startExperience);
  // Also allow clicking anywhere on the overlay
  clickToStart.addEventListener('click', function(e) {
    if (e.target !== enterBtn) startExperience();
  });

  // ── Arrow key movement (supplement to WASD) ──
  // A-Frame's wasd-controls already handles WASD.
  // We add arrow keys manually by simulating movement on the rig.
  const keys = {};
  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup',   e => { keys[e.code] = false; });

  const SPEED = 0.12;
  let lastTime = null;

  function tick(timestamp) {
    if (!lastTime) { lastTime = timestamp; }
    const delta = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    const rig = document.getElementById('rig');
    const cam = document.getElementById('camera');
    if (!rig || !cam) { requestAnimationFrame(tick); return; }

    // Get camera's world Y rotation to move relative to look direction
    const camObj = cam.object3D;
    const yaw = camObj.rotation.y + rig.object3D.rotation.y;

    let dx = 0, dz = 0;
    const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? SPEED * 2.5 : SPEED;

    if (keys['ArrowUp'])    { dx -= Math.sin(yaw) * spd; dz -= Math.cos(yaw) * spd; }
    if (keys['ArrowDown'])  { dx += Math.sin(yaw) * spd; dz += Math.cos(yaw) * spd; }
    if (keys['ArrowLeft'])  { dx -= Math.cos(yaw) * spd; dz += Math.sin(yaw) * spd; }
    if (keys['ArrowRight']) { dx += Math.cos(yaw) * spd; dz -= Math.sin(yaw) * spd; }

    if (dx !== 0 || dz !== 0) {
      const pos = rig.object3D.position;
      pos.x += dx;
      pos.z += dz;
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Mouse drag look (no pointer lock needed) ──
  // A-Frame's look-controls handles this natively with mouse drag.
  // Make sure canvas is clickable.
  scene.addEventListener('loaded', () => {
    const canvas = scene.canvas;
    if (canvas) {
      canvas.style.cursor = 'grab';
      canvas.addEventListener('mousedown', () => { canvas.style.cursor = 'grabbing'; });
      canvas.addEventListener('mouseup',   () => { canvas.style.cursor = 'grab'; });
    }
  });
</script>
