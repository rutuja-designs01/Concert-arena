<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vesperal Ingress: Final Localization</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffff; --bg: #02020a; }
        body { margin: 0; overflow: hidden; background-color: var(--bg); font-family: 'Oswald', sans-serif; }
        
        #hud-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            color: white; z-index: 10;
        }

        #top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .status-panel {
            background: rgba(0, 0, 0, 0.75); border-left: 4px solid var(--accent);
            padding: 15px 25px; backdrop-filter: blur(15px);
        }
        .step-label { font-size: 0.8rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
        .goal-label { font-size: 1.8rem; font-weight: 700; margin-top: 5px; }

        #minimap-container {
            width: 180px; height: 180px; background: rgba(0,0,0,0.8);
            border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 50%;
            position: relative; overflow: hidden; pointer-events: auto;
        }
        #minimap-canvas { width: 100%; height: 100%; }

        #toc-panel {
            background: rgba(0,0,0,0.75); padding: 20px; border-right: 4px solid var(--accent);
            pointer-events: auto; max-width: 250px; backdrop-filter: blur(10px);
        }
        .toc-item {
            padding: 12px; margin: 5px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem; transition: 0.3s; opacity: 0.5;
        }
        .toc-item:hover { background: rgba(0, 255, 255, 0.1); opacity: 1; }
        .toc-item.active { opacity: 1; color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

        #controls-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; color: white;
        }

        button {
            background: var(--accent); border: none; color: black; font-weight: 900;
            padding: 12px 24px; cursor: pointer; text-transform: uppercase;
            font-family: 'Oswald'; transition: 0.3s; pointer-events: auto; margin-top: 10px;
        }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="hud-container">
        <div id="top-row">
            <div class="status-panel">
                <div id="step-text" class="step-label">PHASE 01: ARRIVAL</div>
                <div id="goal-text" class="goal-label">WELCOME TO THE XR EXPERIENCE</div>
            </div>
            
            <div id="minimap-container">
                <canvas id="minimap-canvas"></canvas>
            </div>
        </div>

        <div id="toc-panel">
            <div style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px; letter-spacing: 2px;">INGRESS PROTOCOL</div>
            <div class="toc-item active" onclick="fastTravel(0)">01. ENTRANCE</div>
            <div class="toc-item" onclick="fastTravel(1)">02. BAND COLLECTION</div>
            <div class="toc-item" onclick="fastTravel(2)">03. SECURITY CLEARANCE</div>
            <div class="toc-item" onclick="fastTravel(3)">04. ARENA ACCESS</div>
            <div class="toc-item" onclick="fastTravel(4)">05. YOUR SEAT</div>
            <button onclick="resetNavigation()" style="width: 100%;">RESET CYCLE</button>
        </div>
    </div>

    <div id="controls-hint">WASD: MOVE | Q/E: ROTATE | CLICK NODES TO TELEPORT</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * ARENA NAVIGATION & HUD SYSTEM v7.0
         * Jarvis/TARS Hybrid Engine
         */

        let scene, camera, renderer, userGroup, arenaGroup, navigationLine;
        let miniMapCtx, miniMapCanvas;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let markers = [], overheadArt = [], stars, confettiParticles = [];
        let currentStep = 0;
        let sunGroup, sunLight, ambientLight;
        let confettiTriggered = false;
        let grassMesh;

        const NAVIGATION_NODES = [
            { name: "GRAND ENTRANCE", pos: new THREE.Vector3(0, 0, 30), goal: "COLLECT YOUR WRISTBAND", instruction: "PHASE 01: ARRIVAL" },
            { name: "BAND COLLECTION", pos: new THREE.Vector3(30, 0, 5), goal: "PROCEED TO SECURITY", instruction: "PHASE 02: CREDENTIALS" },
            { name: "SECURITY POINT", pos: new THREE.Vector3(15, 0, -25), goal: "ENTER THE ARENA GATE", instruction: "PHASE 03: CLEARANCE" },
            { name: "ARENA ACCESS", pos: new THREE.Vector3(-35, 0, -65), goal: "FIND THE DIAMOND PLUS SECTION", instruction: "PHASE 04: ARENA INGRESS", reveal: true },
            { name: "YOUR SEAT", pos: new THREE.Vector3(0, 0, -105), goal: "FINAL LOCALIZATION COMPLETE", instruction: "PHASE 05: TERMINAL" }
        ];

        const keys = { w: false, a: false, s: false, d: false, q: false, e: false };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            userGroup = new THREE.Group();
            userGroup.position.set(0, 1.6, 60); 
            userGroup.add(camera);
            scene.add(userGroup);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            setupSun();
            setupEnvironment(); 
            setupArenaLayout();
            setupCelestialMap();
            createNavigationMarkers();
            createNavigationPath();
            setupOverheadArt();

            miniMapCanvas = document.getElementById('minimap-canvas');
            miniMapCtx = miniMapCanvas.getContext('2d');

            window.addEventListener('resize', onResize);
            window.addEventListener('click', onInteraction);
            window.addEventListener('keydown', (e) => toggleKey(e.code, true));
            window.addEventListener('keyup', (e) => toggleKey(e.code, false));

            animate();
        }

        function setupSun() {
            sunGroup = new THREE.Group();
            sunLight = new THREE.DirectionalLight(0xffaa44, 2.5);
            sunLight.position.set(0, 400, -1500); 
            sunGroup.add(sunLight);
            
            const sunGeo = new THREE.SphereGeometry(60, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
            const sunMesh = new THREE.Mesh(sunGeo, sunMat);
            sunMesh.position.copy(sunLight.position);
            sunGroup.add(sunMesh);

            // Glow shells
            for(let i=1; i<=3; i++) {
                const glowGeo = new THREE.SphereGeometry(60 + i*40, 32, 32);
                const glowMat = new THREE.MeshBasicMaterial({ 
                    color: 0xffaa00, 
                    transparent: true, 
                    opacity: 0.2 / i,
                    blending: THREE.AdditiveBlending
                });
                const glowMesh = new THREE.Mesh(glowGeo, glowMat);
                glowMesh.position.copy(sunLight.position);
                sunGroup.add(glowMesh);
            }
            scene.add(sunGroup);
        }

        function toggleKey(code, state) {
            const m = { 'KeyW': 'w', 'KeyA': 'a', 'KeyS': 's', 'KeyD': 'd', 'KeyQ': 'q', 'KeyE': 'e' };
            if (m[code]) keys[m[code]] = state;
        }

        function setupEnvironment() {
            // Grass Base
            const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshStandardMaterial({ color: 0x0a1a0a, roughness: 1.0 })
            );
            plane.rotation.x = -Math.PI / 2;
            scene.add(plane);

            // Tall Grass (InstancedMesh for performance)
            const grassCount = 15000;
            const grassGeo = new THREE.PlaneGeometry(0.1, 0.8);
            const grassMat = new THREE.MeshStandardMaterial({ 
                color: 0x114411, 
                side: THREE.DoubleSide,
                alphaTest: 0.5
            });
            grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
            const dummy = new THREE.Object3D();
            for (let i = 0; i < grassCount; i++) {
                dummy.position.set((Math.random()-0.5)*600, 0.4, (Math.random()-0.5)*600);
                dummy.rotation.y = Math.random() * Math.PI;
                dummy.updateMatrix();
                grassMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(grassMesh);

            // Nature: Flowers
            const flowerGeo = new THREE.SphereGeometry(0.15, 4, 4);
            const flowerColors = [0xff00ff, 0xffff00, 0x00ffff, 0xffffff, 0xff5500];
            for(let i=0; i<2000; i++) {
                const f = new THREE.Mesh(flowerGeo, new THREE.MeshBasicMaterial({ color: flowerColors[i%5] }));
                f.position.set((Math.random()-0.5)*600, 0.05, (Math.random()-0.5)*600);
                scene.add(f);
            }

            // Welcome Text
            const welcomeLabel = createSprite("WELCOME TO THE XR EXPERIENCE", 50, "#00ffff", true);
            welcomeLabel.position.set(0, 8, 45);
            welcomeLabel.scale.set(15, 3, 1);
            scene.add(welcomeLabel);
        }

        function setupCelestialMap() {
            const starGeo = new THREE.BufferGeometry();
            const posArray = new Float32Array(5000 * 3);
            for(let i=0; i<5000*3; i++) posArray[i] = (Math.random()-0.5) * 2000;
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true }));
            scene.add(stars);
        }

        function setupArenaLayout() {
            arenaGroup = new THREE.Group();
            arenaGroup.position.z = -130; 
            arenaGroup.visible = false;
            scene.add(arenaGroup);

            // The Concert Stage
            const stageMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8 });
            const main = new THREE.Mesh(new THREE.BoxGeometry(24, 2, 10), stageMat);
            const catwalk = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 18), stageMat);
            catwalk.position.z = 14;
            const bStage = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 10), stageMat);
            bStage.position.z = 28;
            arenaGroup.add(main, catwalk, bStage);

            // Giant LED Screen
            const screenGeo = new THREE.PlaneGeometry(24, 12);
            const screenMat = new THREE.MeshStandardMaterial({ 
                color: 0x002244, 
                emissive: 0x0044ff, 
                emissiveIntensity: 0.5 
            });
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.position.set(0, 8, -4.5);
            arenaGroup.add(screen);

            // Seating with Headed People
            const sections = [
                { color: 0x4444ff, x: 0, z: 48, w: 16, d: 12 },
                { color: 0x9966ff, x: 15, z: 22, w: 12, d: 10 },
                { color: 0x9966ff, x: -15, z: 22, w: 12, d: 10 }
            ];
            sections.forEach(s => populateSection(arenaGroup, s.color, s.x, s.z, s.w, s.d));

            // Final Seat Light
            const beam = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.4, 100, 16),
                new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 })
            );
            beam.position.set(0, 50, 48); 
            arenaGroup.add(beam);
        }

        function populateSection(parent, color, x, z, w, d) {
            const base = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color }));
            base.position.set(x, 0.25, z);
            parent.add(base);

            for (let i = 0; i < 30; i++) {
                const person = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                head.position.y = 0.8;
                person.add(body, head);
                person.position.set(x + (Math.random()-0.5)*(w-1.5), 0.8, z + (Math.random()-0.5)*(d-1.5));
                parent.add(person);
            }
        }

        function createNavigationPath() {
            const pts = NAVIGATION_NODES.map(n => n.pos.clone().add(new THREE.Vector3(0, 0.2, 0)));
            const curve = new THREE.CatmullRomCurve3(pts);
            const tube = new THREE.Mesh(
                new THREE.TubeGeometry(curve, 100, 0.15, 8, false),
                new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.4 })
            );
            navigationLine = tube;
            scene.add(navigationLine);
        }

        function setupOverheadArt() {
            const pts = NAVIGATION_NODES.map(n => n.pos.clone().add(new THREE.Vector3(0, 12, 0)));
            const curve = new THREE.CatmullRomCurve3(pts);
            const colors = [0xff00ff, 0x00ffff, 0xffff00];
            for(let i=0; i<60; i++) {
                const t = i / 59;
                const pos = curve.getPoint(t);
                const mesh = new THREE.Mesh(
                    new THREE.TorusKnotGeometry(1.2, 0.2, 64, 8),
                    new THREE.MeshStandardMaterial({ color: colors[i%3], emissive: colors[i%3], emissiveIntensity: 0.6 })
                );
                mesh.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*5, 0));
                scene.add(mesh);
                overheadArt.push({ mesh, rot: Math.random()*0.02 + 0.01 });
            }
        }

        function createNavigationMarkers() {
            NAVIGATION_NODES.forEach((node, idx) => {
                const g = new THREE.Group();
                g.position.copy(node.pos);

                const ring = new THREE.Mesh(new THREE.RingGeometry(1.5, 1.8, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide }));
                ring.rotation.x = -Math.PI/2;
                g.add(ring);

                const sprite = createSprite(node.name, 120, "white", true);
                sprite.position.y = 5; sprite.scale.set(10, 2.5, 1);
                g.add(sprite);

                g.userData = { idx };
                scene.add(g);
                markers.push({ g, ring });
            });
        }

        function createSprite(text, size, color, shadow) {
            const can = document.createElement('canvas');
            const ctx = can.getContext('2d');
            can.width = 1024; can.height = 256;
            ctx.font = `900 ${size}px 'Oswald'`;
            ctx.textAlign = 'center'; ctx.fillStyle = color;
            if(shadow) { ctx.shadowColor = 'cyan'; ctx.shadowBlur = 15; }
            ctx.fillText(text, 512, 128);
            return new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can) }));
        }

        function triggerConfetti() {
            if (confettiTriggered) return;
            confettiTriggered = true;
            for(let i=0; i<200; i++) {
                const p = new THREE.Mesh(
                    new THREE.PlaneGeometry(0.3, 0.3),
                    new THREE.MeshBasicMaterial({ color: Math.random()*0xffffff, side: THREE.DoubleSide })
                );
                p.position.set((Math.random()-0.5)*30, 15, 30);
                p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.3, -Math.random()*0.2 - 0.1, (Math.random()-0.5)*0.3), rot: Math.random()*0.15 };
                scene.add(p);
                confettiParticles.push(p);
            }
        }

        function onInteraction(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(markers.map(m => m.g), true);
            if (hits.length > 0) {
                let o = hits[0].object;
                while (o.parent && !o.userData.hasOwnProperty('idx')) o = o.parent;
                fastTravel(o.userData.idx);
            }
        }

        function fastTravel(idx) {
            if (idx > currentStep + 1) return;
            const n = NAVIGATION_NODES[idx];
            userGroup.position.set(n.pos.x, 1.6, n.pos.z + 5);
            currentStep = Math.max(currentStep, idx);
            
            document.getElementById('step-text').innerText = n.instruction;
            document.getElementById('goal-text').innerText = n.goal;
            
            if (n.reveal) arenaGroup.visible = true;
            if (idx === 0) triggerConfetti();

            document.querySelectorAll('.toc-item').forEach((item, i) => {
                item.classList.toggle('active', i === idx);
            });
        }

        function updateMinimap() {
            miniMapCtx.clearRect(0, 0, 180, 180);
            const cx = 90, cy = 90, s = 0.7;
            miniMapCtx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
            miniMapCtx.beginPath();
            NAVIGATION_NODES.forEach((n, i) => {
                const px = cx + n.pos.x * s, py = cy + n.pos.z * s;
                if(i===0) miniMapCtx.moveTo(px, py); else miniMapCtx.lineTo(px, py);
            });
            miniMapCtx.stroke();
            NAVIGATION_NODES.forEach((n, i) => {
                miniMapCtx.fillStyle = i <= currentStep ? '#00ff00' : '#444';
                miniMapCtx.beginPath(); miniMapCtx.arc(cx + n.pos.x*s, cy + n.pos.z*s, 4, 0, Math.PI*2); miniMapCtx.fill();
            });
            miniMapCtx.fillStyle = '#fff';
            miniMapCtx.beginPath(); miniMapCtx.arc(cx + userGroup.position.x*s, cy + userGroup.position.z*s, 6, 0, Math.PI*2); miniMapCtx.fill();
        }

        function resetNavigation() {
            currentStep = 0; arenaGroup.visible = false; confettiTriggered = false;
            fastTravel(0);
            userGroup.position.set(0, 1.6, 60);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const time = performance.now() * 0.001;

                // Vesperal Sun & Lighting Synced Transition
                const cycle = (Math.sin(time * 0.05) + 1) / 2; // Slow solar cycle
                sunGroup.rotation.x = cycle * -Math.PI; 
                
                // Photometric calculations: transition colors based on solar angle
                const afternoonSky = new THREE.Color(0x87ceeb);
                const eveningSky = new THREE.Color(0x02020a);
                const currentSky = afternoonSky.clone().lerp(eveningSky, cycle);
                
                scene.background = currentSky;
                scene.fog = new THREE.FogExp2(currentSky, 0.015);
                
                sunLight.intensity = 2.5 * (1 - cycle);
                ambientLight.intensity = 0.4 * (1 - cycle) + 0.1;
                stars.material.opacity = cycle;

                // WASD
                if (!renderer.xr.isPresenting) {
                    const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                    const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
                    const speed = 0.5;
                    if (keys.w) userGroup.position.addScaledVector(dir, speed);
                    if (keys.s) userGroup.position.addScaledVector(dir, -speed);
                    if (keys.a) userGroup.position.addScaledVector(side, speed);
                    if (keys.d) userGroup.position.addScaledVector(side, -speed);
                    if (keys.q) userGroup.rotation.y += 0.04;
                    if (keys.e) userGroup.rotation.y -= 0.04;
                }

                // Confetti Physics
                confettiParticles.forEach((p, i) => {
                    p.position.add(p.userData.vel);
                    p.rotation.x += p.userData.rot;
                    if(p.position.y < 0) { scene.remove(p); confettiParticles.splice(i, 1); }
                });

                overheadArt.forEach(a => a.mesh.rotation.y += a.rot);
                navigationLine.material.opacity = 0.2 + Math.sin(time*2.5)*0.1;
                updateMinimap();
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
